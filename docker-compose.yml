services:
  argos-prod:
    container_name: argos-frontend
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
        - VITE_POCKETBASE_URL=${VITE_POCKETBASE_URL}
        - VITE_POCKETBASE_TEST_USER_EMAIL=${VITE_POCKETBASE_TEST_USER_EMAIL}
        - VITE_POCKETBASE_TEST_USER_PASSWORD=${VITE_POCKETBASE_TEST_USER_PASSWORD}
        - VITE_USE_MOCK=${VITE_USE_MOCK}
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - VITE_POCKETBASE_URL=${VITE_POCKETBASE_URL}
      - VITE_POCKETBASE_TEST_USER_EMAIL=${VITE_POCKETBASE_TEST_USER_EMAIL}
      - VITE_POCKETBASE_TEST_USER_PASSWORD=${VITE_POCKETBASE_TEST_USER_PASSWORD}
      - VITE_USE_MOCK=${VITE_USE_MOCK}
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://localhost:8080').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
